name: Preview Deploy

on:
  pull_request:
    types: [opened, synchronize]

concurrency:
  group: preview-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci

      - name: Create or get preview D1 database
        id: create-db
        run: |
          DB_NAME="mellitrack-db-pr-${{ github.event.number }}"
          CF_API="https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/d1/database"
          AUTH="Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}"

          # Look up existing database via API (wrangler d1 list truncates UUIDs)
          DB_ID=$(curl -sf -H "$AUTH" "$CF_API" | python3 -c "
import json, sys
data = json.load(sys.stdin)
for db in data.get('result', []):
    if db['name'] == '$DB_NAME':
        print(db['uuid'])
        break
")

          if [ -z "$DB_ID" ]; then
            echo "Creating new database: $DB_NAME"
            # Create via API (wrangler d1 create fails if name already exists)
            CREATE_RESULT=$(curl -sf -X POST -H "$AUTH" -H "Content-Type: application/json" \
              -d "{\"name\":\"$DB_NAME\"}" "$CF_API")
            DB_ID=$(echo "$CREATE_RESULT" | python3 -c "
import json, sys
data = json.load(sys.stdin)
print(data.get('result', {}).get('uuid', ''))
")
            if [ -n "$DB_ID" ]; then
              echo "Created new database: $DB_NAME ($DB_ID)"
              echo "forked=true" >> "$GITHUB_OUTPUT"
            else
              echo "Failed to create database via API, trying wrangler as fallback..."
              CREATE_OUTPUT=$(npx wrangler d1 create "$DB_NAME" 2>&1)
              DB_ID=$(echo "$CREATE_OUTPUT" | grep -Eo '[a-f0-9-]{36}' | head -1)
              if [ -n "$DB_ID" ]; then
                echo "Created new database via wrangler: $DB_NAME ($DB_ID)"
                echo "forked=true" >> "$GITHUB_OUTPUT"
              else
                echo "Warning: Could not create or find preview database."
                echo "forked=false" >> "$GITHUB_OUTPUT"
              fi
            fi
          else
            echo "Found existing database: $DB_NAME ($DB_ID)"
            echo "forked=false" >> "$GITHUB_OUTPUT"
          fi
          echo "db_id=$DB_ID" >> "$GITHUB_OUTPUT"
          echo "db_name=$DB_NAME" >> "$GITHUB_OUTPUT"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Seed preview database with default user
        if: steps.create-db.outputs.forked == 'true'
        run: |
          PREVIEW_DB_ID="${{ steps.create-db.outputs.db_id }}"
          if [ -z "$PREVIEW_DB_ID" ]; then
            echo "No database ID available, skipping seed"
            exit 0
          fi
          CF_API="https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/d1/database/$PREVIEW_DB_ID/query"
          AUTH="Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}"

          echo "Seeding default user..."
          # password: mellitrack123 -> SHA-256 hex hash
          curl -sf -X POST -H "$AUTH" -H "Content-Type: application/json" -d '{"sql":"INSERT OR IGNORE INTO users (id, username, password_hash) VALUES (1, '"'"'default'"'"', '"'"'9361d32cd2deb7c0168d7426fc75787f96827d8864cd8ced7f2b7f6aa46916b8'"'"')"}' "$CF_API" > /dev/null && echo "  ✓ Default user created"

          # Seed default categories so the dashboard has something to show
          curl -sf -X POST -H "$AUTH" -H "Content-Type: application/json" -d '{"sql":"INSERT OR IGNORE INTO exercise_categories (id, name, user_id, sort_order) VALUES (1, '"'"'Oberkörper'"'"', 1, 1), (2, '"'"'Unterkörper'"'"', 1, 2), (3, '"'"'Ganzkörper'"'"', 1, 3)"}' "$CF_API" > /dev/null && echo "  ✓ Default categories created"

          echo "Preview database seeded! Login: default / mellitrack123"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Generate preview wrangler.toml
        run: |
          cat > wrangler.preview.toml <<EOF
          name = "mellitrack-pr-${{ github.event.number }}"
          main = "src/server/index.ts"
          compatibility_date = "2024-05-12"

          [vars]
          APP_PASSWORD = "mellitrack123"

          [[d1_databases]]
          binding = "DB"
          database_name = "${{ steps.create-db.outputs.db_name }}"
          database_id = "${{ steps.create-db.outputs.db_id }}"
          EOF

      - name: Apply migrations to preview DB
        run: |
          PREVIEW_DB_ID="${{ steps.create-db.outputs.db_id }}"
          if [ -z "$PREVIEW_DB_ID" ]; then
            echo "No database ID available, skipping migrations"
            exit 0
          fi
          CF_API="https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/d1/database/$PREVIEW_DB_ID/query"
          AUTH="Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}"

          # Apply migrations via D1 SQL API (replaces wrangler d1 migrations apply)
          for f in migrations/*.sql; do
            echo "Applying migration: $f"
            SQL=$(cat "$f")
            # Escape for JSON and send
            curl -sf -X POST -H "$AUTH" -H "Content-Type: application/json" \
              -d "$(python3 -c "
import json, sys
with open('$f') as fh:
    sql = fh.read()
print(json.dumps({'sql': sql}))
")" "$CF_API" > /dev/null
            echo "  ✓ $f applied"
          done
          echo "All migrations applied successfully!"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Build
        run: npm run build
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy preview worker
        id: deploy
        run: |
          npx wrangler deploy --config wrangler.preview.toml 2>&1 | tee deploy.log
          URL=$(grep -oP 'https://[^\s]+' deploy.log | tail -1)
          if [ -z "$URL" ]; then
            URL="https://mellitrack-pr-${{ github.event.number }}.joereuter.dev"
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.url }}';
            const body = `🚀 Preview deployed: ${url}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('🚀 Preview deployed:'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
