name: Preview Deploy

on:
  pull_request:
    types: [opened, synchronize]

concurrency:
  group: preview-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci

      - name: Create or get preview D1 database
        id: create-db
        run: |
          DB_NAME="mellitrack-db-pr-${{ github.event.number }}"
          export CF_API_TOKEN="${{ secrets.CLOUDFLARE_API_TOKEN }}"
          export CF_ACCOUNT_ID="${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"

          DB_ID=$(python3 scripts/d1_api.py list "$DB_NAME")
          if [ -z "$DB_ID" ]; then
            echo "Creating new database: $DB_NAME"
            DB_ID=$(python3 scripts/d1_api.py create "$DB_NAME")
            if [ -n "$DB_ID" ]; then
              echo "Created new database: $DB_NAME ($DB_ID)"
              echo "forked=true" >> "$GITHUB_OUTPUT"
            else
              echo "Warning: Could not create preview database."
              echo "forked=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "Found existing database: $DB_NAME ($DB_ID)"
            echo "forked=false" >> "$GITHUB_OUTPUT"
          fi
          echo "db_id=$DB_ID" >> "$GITHUB_OUTPUT"
          echo "db_name=$DB_NAME" >> "$GITHUB_OUTPUT"

      - name: Generate preview wrangler.toml
        run: |
          cat > wrangler.preview.toml <<EOF
          name = "mellitrack-pr-${{ github.event.number }}"
          main = "src/server/index.ts"
          compatibility_date = "2024-05-12"

          [[d1_databases]]
          binding = "DB"
          database_name = "${{ steps.create-db.outputs.db_name }}"
          database_id = "${{ steps.create-db.outputs.db_id }}"
          EOF

      - name: Apply migrations to preview DB
        run: |
          DB_ID="${{ steps.create-db.outputs.db_id }}"
          if [ -z "$DB_ID" ]; then
            echo "No database ID available, skipping migrations"
            exit 0
          fi
          export CF_API_TOKEN="${{ secrets.CLOUDFLARE_API_TOKEN }}"
          export CF_ACCOUNT_ID="${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"

          for f in migrations/*.sql; do
            echo "Applying migration: $f"
            python3 scripts/d1_api.py query "$DB_ID" "$f"
          done
          echo "All migrations applied successfully!"

      - name: Seed preview database with default user
        if: steps.create-db.outputs.forked == 'true'
        run: |
          DB_ID="${{ steps.create-db.outputs.db_id }}"
          if [ -z "$DB_ID" ]; then
            echo "No database ID available, skipping seed"
            exit 0
          fi
          export CF_API_TOKEN="${{ secrets.CLOUDFLARE_API_TOKEN }}"
          export CF_ACCOUNT_ID="${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
          echo "Seeding preview database..."
          python3 scripts/d1_api.py seed "$DB_ID"
          echo "Preview database seeded! Default user: default / demo123"

      - name: Build
        run: npm run build
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy preview worker
        id: deploy
        run: |
          npx wrangler deploy --config wrangler.preview.toml 2>&1 | tee deploy.log
          # Extract the deployed worker URL (contains *.workers.dev)
          URL=$(grep -oE 'https://[a-z0-9.-]+\.workers\.dev' deploy.log | tail -1)
          if [ -z "$URL" ]; then
            URL="https://mellitrack-pr-${{ github.event.number }}.joereuter.dev"
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.url }}';
            const body = `🚀 Preview deployed: ${url}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('🚀 Preview deployed:'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
