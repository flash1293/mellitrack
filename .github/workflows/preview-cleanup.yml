name: Preview Cleanup

on:
  pull_request:
    types: [closed]

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci

      - name: Delete preview worker
        run: |
          cat > wrangler.cleanup.toml <<EOF
          name = "mellitrack-pr-${{ github.event.number }}"
          main = "src/server/index.ts"
          compatibility_date = "2024-05-12"
          EOF
          npx wrangler delete --config wrangler.cleanup.toml --force || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Delete preview D1 database
        run: |
          DB_NAME="mellitrack-db-pr-${{ github.event.number }}"
          DB_ID=""
          page=1
          # Walk pages to find the preview DB by name
          while true; do
            RESULT=$(curl -s "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/d1/database?per_page=50&page=${page}" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}")
            FOUND=$(echo "$RESULT" | jq -r --arg name "$DB_NAME" '.result[] | select(.name == $name) | .uuid' | head -1)
            if [ -n "$FOUND" ]; then
              DB_ID="$FOUND"
              break
            fi
            TOTAL_PAGES=$(echo "$RESULT" | jq -r '.result_info.total_pages // 1')
            [ "$page" -ge "$TOTAL_PAGES" ] && break
            page=$((page + 1))
          done
          if [ -n "$DB_ID" ]; then
            echo "Deleting D1 database $DB_NAME ($DB_ID)"
            curl -s -X DELETE "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/d1/database/${DB_ID}" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" | jq .
          else
            echo "No preview database found to delete"
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Remove preview URL comment
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('🚀 Preview deployed:'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: `~~${existing.body}~~\n\n⛔ Preview environment destroyed on PR close.`,
              });
            }
